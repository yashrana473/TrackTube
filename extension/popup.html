<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourseSync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    <h3>CourseSync</h3>
    
    <p id="status-message">Open a YouTube Playlist to track it.</p>
    
    <div id="stats-container" class="hidden">
      <p id="playlist-title">Loading...</p>
      <p id="video-count">-- Videos</p>
    </div>

    <button id="import-btn">Track This Playlist</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
